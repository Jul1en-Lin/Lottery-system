<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareerCompass Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: #ffffff;
      --foreground: #111827;
      --muted: #6b7280;
      --border: rgba(148, 163, 184, 0.35);
      --panel: rgba(255, 255, 255, 0.9);
      --primary: #4c57c5;
      --primary-foreground: #f8fafc;
      --destructive: #dc2626;
      --destructive-soft: rgba(220, 38, 38, 0.1);
      --shadow: 0 30px 70px rgba(15, 23, 42, 0.14);
      --radius: 24px;
      --look-x: 0px;
      --look-y: 0px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--background);
      color: var(--foreground);
      font-family: "Manrope", sans-serif;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
    }

    .hero {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 48px;
      color: #ffffff;
      background:
        radial-gradient(circle at 76% 24%, rgba(255, 255, 255, 0.14), transparent 24%),
        radial-gradient(circle at 22% 78%, rgba(255, 255, 255, 0.12), transparent 28%),
        linear-gradient(135deg, #9aa0a7 0%, #707783 48%, #565d68 100%);
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
      background-size: 20px 20px;
      pointer-events: none;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto auto 60px 70px;
      width: 420px;
      height: 420px;
      background: rgba(255, 255, 255, 0.08);
      filter: blur(90px);
      border-radius: 50%;
      pointer-events: none;
    }

    .hero-top,
    .hero-stage,
    .hero-footer {
      position: relative;
      z-index: 1;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand img {
      width: 32px;
      height: 32px;
      padding: 4px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(10px);
    }

    .hero-stage {
      display: flex;
      align-items: end;
      justify-content: center;
      min-height: 500px;
    }

    .characters {
      position: relative;
      width: min(100%, 550px);
      height: 400px;
    }

    .character {
      position: absolute;
      bottom: 0;
      transition: transform 0.7s ease, height 0.7s ease;
      transform-origin: bottom center;
    }

    .character.purple {
      left: 70px;
      width: 180px;
      height: 400px;
      background: #6c3ff5;
      border-radius: 10px 10px 0 0;
      z-index: 1;
    }

    .character.black {
      left: 240px;
      width: 120px;
      height: 310px;
      background: #2d2d2d;
      border-radius: 8px 8px 0 0;
      z-index: 2;
    }

    .character.orange {
      left: 0;
      width: 240px;
      height: 200px;
      background: #ff9b6b;
      border-radius: 120px 120px 0 0;
      z-index: 3;
    }

    .character.yellow {
      left: 310px;
      width: 140px;
      height: 230px;
      background: #e8d754;
      border-radius: 70px 70px 0 0;
      z-index: 4;
    }

    .face {
      position: absolute;
      display: flex;
      gap: 24px;
      transition: all 0.4s ease;
    }

    .purple .face {
      left: 45px;
      top: 40px;
      gap: 32px;
    }

    .black .face {
      left: 26px;
      top: 32px;
      gap: 24px;
    }

    .orange .face {
      left: 82px;
      top: 90px;
      gap: 30px;
    }

    .yellow .face {
      left: 52px;
      top: 40px;
      gap: 22px;
    }

    .eye {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: #ffffff;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: height 0.18s ease;
    }

    .eye.small {
      width: 16px;
      height: 16px;
    }

    .eye.blink {
      height: 2px;
    }

    .pupil {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #2d2d2d;
      transform: translate(var(--pupil-x, 0px), var(--pupil-y, 0px));
      transition: transform 0.1s ease-out;
    }

    .pupil.dot {
      width: 12px;
      height: 12px;
    }

    .mouth {
      position: absolute;
      left: 40px;
      top: 88px;
      width: 20px;
      height: 4px;
      background: #2d2d2d;
      border-radius: 999px;
    }

    .hero-footer {
      display: flex;
      gap: 32px;
      color: rgba(31, 41, 55, 0.86);
      font-size: 0.94rem;
    }

    .hero-footer a {
      transition: color 0.2s ease;
    }

    .hero-footer a:hover {
      color: #111827;
    }

    .panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      background:
        radial-gradient(circle at top left, rgba(76, 87, 197, 0.08), transparent 35%),
        radial-gradient(circle at bottom right, rgba(15, 23, 42, 0.06), transparent 30%),
        #ffffff;
    }

    .panel-inner {
      width: 100%;
      max-width: 420px;
    }

    .brand-mobile {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 48px;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand-mobile img {
      width: 32px;
      height: 32px;
    }

    .panel-header {
      margin-bottom: 40px;
      text-align: center;
    }

    .panel-header h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 2.45rem);
      line-height: 1;
      letter-spacing: -0.05em;
    }

    .panel-header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    label {
      font-size: 0.92rem;
      font-weight: 600;
    }

    .input-wrap {
      position: relative;
    }

    .text-input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.92);
      padding: 0 16px;
      color: var(--foreground);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
      box-shadow: 0 1px 0 rgba(15, 23, 42, 0.02);
    }

    .text-input:focus {
      border-color: rgba(76, 87, 197, 0.55);
      box-shadow: 0 0 0 4px rgba(76, 87, 197, 0.12);
      transform: translateY(-1px);
    }

    .password-input {
      padding-right: 52px;
    }

    .toggle-visibility {
      position: absolute;
      top: 50%;
      right: 14px;
      width: 28px;
      height: 28px;
      padding: 0;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: #64748b;
      cursor: pointer;
      transform: translateY(-50%);
      transition: background 0.2s ease, color 0.2s ease;
    }

    .toggle-visibility:hover {
      color: #0f172a;
      background: rgba(15, 23, 42, 0.05);
    }

    .toggle-visibility svg {
      width: 18px;
      height: 18px;
      display: block;
      margin: auto;
    }

    .helper-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      font-size: 0.92rem;
    }

    .remember {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #334155;
      cursor: pointer;
      user-select: none;
    }

    .remember input {
      width: 16px;
      height: 16px;
      accent-color: var(--primary);
    }

    .forgot {
      color: var(--primary);
      font-weight: 700;
    }

    .forgot:hover {
      text-decoration: underline;
    }

    .message {
      display: none;
      padding: 14px 16px;
      border-radius: 16px;
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .message.show {
      display: block;
    }

    .message.error {
      color: var(--destructive);
      background: var(--destructive-soft);
      border: 1px solid rgba(220, 38, 38, 0.24);
    }

    .message.success {
      color: #166534;
      background: rgba(22, 101, 52, 0.1);
      border: 1px solid rgba(22, 101, 52, 0.18);
    }

    .hover-button {
      position: relative;
      width: 100%;
      height: 52px;
      border: 1px solid transparent;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.98);
      color: var(--foreground);
      font-weight: 700;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    .hover-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 34px rgba(15, 23, 42, 0.12);
    }

    .hover-button .default-text,
    .hover-button .hover-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .hover-button .hover-text {
      background: var(--primary);
      color: var(--primary-foreground);
      opacity: 0;
      transform: translateX(-12px);
    }

    .hover-button:hover .default-text {
      opacity: 0;
      transform: translateX(34px);
    }

    .hover-button:hover .hover-text {
      opacity: 1;
      transform: translateX(0);
    }

    .hover-button.secondary {
      margin-top: 24px;
      border-color: var(--border);
      background: rgba(255, 255, 255, 0.92);
    }

    .hover-button:disabled {
      cursor: wait;
      opacity: 0.7;
      transform: none;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    .google-icon,
    .arrow-icon {
      width: 18px;
      height: 18px;
      flex: none;
    }

    .signup {
      margin-top: 32px;
      text-align: center;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .signup a {
      color: var(--foreground);
      font-weight: 700;
    }

    .signup a:hover {
      text-decoration: underline;
    }

    .error-text {
      min-height: 18px;
      color: var(--destructive);
      font-size: 0.85rem;
    }

    .characters.typing .purple {
      height: 440px;
      transform: skewX(-10deg) translateX(34px);
    }

    .characters.typing .black {
      transform: skewX(8deg) translateX(18px);
    }

    .characters.typing .purple .face {
      left: 56px;
      top: 64px;
    }

    .characters.typing .black .face {
      left: 32px;
      top: 12px;
    }

    .characters.password-hidden .purple {
      height: 440px;
      transform: skewX(-12deg) translateX(40px);
    }

    .characters.password-visible .purple,
    .characters.password-visible .black,
    .characters.password-visible .orange,
    .characters.password-visible .yellow {
      transform: skewX(0deg) translateX(0);
    }

    .characters.password-visible .purple .face {
      left: 20px;
      top: 35px;
    }

    .characters.password-visible .black .face {
      left: 10px;
      top: 28px;
    }

    .characters.password-visible .orange .face {
      left: 50px;
      top: 85px;
    }

    .characters.password-visible .yellow .face {
      left: 20px;
      top: 35px;
    }

    .characters.password-visible .yellow .mouth {
      left: 10px;
    }

    .characters.peek .purple .face {
      transform: translate(4px, 5px);
    }

    .characters.peek .orange .face,
    .characters.peek .yellow .face {
      transform: translate(-5px, -4px);
    }

    @media (max-width: 1024px) {
      body {
        overflow: auto;
      }

      .page {
        grid-template-columns: 1fr;
      }

      .hero {
        display: none;
      }

      .panel {
        min-height: 100vh;
        padding: 28px 20px;
      }

      .brand-mobile {
        display: flex;
      }
    }

    @media (max-width: 640px) {
      .panel-inner {
        max-width: 100%;
      }

      .panel-header {
        margin-bottom: 32px;
      }

      .helper-row {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-hidden="true">
      <div class="hero-top">
        <a class="brand" href="/">
          <img src="https://i.postimg.cc/nLrDYrHW/icon.png" alt="CareerCompass logo">
          <span>CareerCompass</span>
        </a>
      </div>

      <div class="hero-stage">
        <div class="characters" id="characters">
          <div class="character purple" data-face>
            <div class="face">
              <div class="eye blinkable"><div class="pupil"></div></div>
              <div class="eye blinkable"><div class="pupil"></div></div>
            </div>
          </div>

          <div class="character black" data-face>
            <div class="face">
              <div class="eye small blinkable"><div class="pupil"></div></div>
              <div class="eye small blinkable"><div class="pupil"></div></div>
            </div>
          </div>

          <div class="character orange" data-face>
            <div class="face">
              <div class="pupil dot"></div>
              <div class="pupil dot"></div>
            </div>
          </div>

          <div class="character yellow" data-face>
            <div class="face">
              <div class="pupil dot"></div>
              <div class="pupil dot"></div>
            </div>
            <div class="mouth"></div>
          </div>
        </div>
      </div>

      <div class="hero-footer">
        <a href="/privacy-policy">Privacy Policy</a>
        <a href="/terms">Terms of Service</a>
      </div>
    </section>

    <section class="panel">
      <div class="panel-inner">
        <div class="brand-mobile">
          <img src="https://i.postimg.cc/nLrDYrHW/icon.png" alt="CareerCompass logo">
          <span>CareerCompass</span>
        </div>

        <header class="panel-header">
          <h1>Welcome back!</h1>
          <p>Please enter your details</p>
        </header>

        <form id="login-form" novalidate>
          <div class="field">
            <label for="email">Email</label>
            <div class="input-wrap">
              <input class="text-input" id="email" name="email" type="email" placeholder="you@example.com" autocomplete="off">
            </div>
            <div class="error-text" id="email-error"></div>
          </div>

          <div class="field">
            <label for="password">Password</label>
            <div class="input-wrap">
              <input class="text-input password-input" id="password" name="password" type="password" placeholder="********" autocomplete="current-password">
              <button class="toggle-visibility" type="button" id="toggle-password" aria-label="Show password">
                <svg id="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg id="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                  <path d="M3 3l18 18"></path>
                  <path d="M10.6 10.7a3 3 0 0 0 4.2 4.2"></path>
                  <path d="M9.9 5.2A10.6 10.6 0 0 1 12 5c6.5 0 10 7 10 7a17.7 17.7 0 0 1-3 4.1"></path>
                  <path d="M6.6 6.7C4.2 8.4 2.7 11 2 12c0 0 3.5 7 10 7a9.8 9.8 0 0 0 4.4-1"></path>
                </svg>
              </button>
            </div>
            <div class="error-text" id="password-error"></div>
          </div>

          <div class="helper-row">
            <label class="remember" for="remember">
              <input id="remember" type="checkbox">
              <span>Remember for 30 days</span>
            </label>
            <a class="forgot" href="/forgot-password">Forgot password?</a>
          </div>

          <div class="message error" id="form-error"></div>
          <div class="message success" id="form-success"></div>

          <button class="hover-button" id="submit-button" type="submit">
            <span class="default-text">Log in</span>
            <span class="hover-text">
              <span>Log in</span>
              <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14"></path>
                <path d="m13 5 7 7-7 7"></path>
              </svg>
            </span>
          </button>
        </form>

        <button class="hover-button secondary" type="button" id="google-button">
          <span class="default-text">Log in with Google</span>
          <span class="hover-text">
            <span>Log in with Google</span>
            <svg class="google-icon" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 488 512">
              <path fill="currentColor" d="M488 261.8C488 403.3 391.1 504 248 504 110.8 504 0 393.2 0 256S110.8 8 248 8c66.8 0 126 23.4 172.9 61.9l-76.2 76.2C322.3 113.2 289.4 96 248 96c-88.8 0-160.1 71.9-160.1 160.1s71.3 160.1 160.1 160.1c98.2 0 135-70.4 140.8-106.9H248v-85.3h236.1c2.3 12.7 3.9 26.9 3.9 41.4z"></path>
            </svg>
          </span>
        </button>

        <p class="signup">
          Don't have an account?
          <a href="/signup">Sign Up</a>
        </p>
      </div>
    </section>
  </main>

  <script>
    const characters = document.getElementById("characters");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const togglePassword = document.getElementById("toggle-password");
    const eyeOpen = document.getElementById("eye-open");
    const eyeClosed = document.getElementById("eye-closed");
    const form = document.getElementById("login-form");
    const submitButton = document.getElementById("submit-button");
    const googleButton = document.getElementById("google-button");
    const emailError = document.getElementById("email-error");
    const passwordError = document.getElementById("password-error");
    const formError = document.getElementById("form-error");
    const formSuccess = document.getElementById("form-success");
    const blinkableEyes = Array.from(document.querySelectorAll(".blinkable"));
    const allPupils = Array.from(document.querySelectorAll(".pupil"));

    let typingTimer = null;
    let peekTimer = null;

    function setMessage(element, text) {
      element.textContent = text;
      element.classList.toggle("show", Boolean(text));
    }

    function clearMessages() {
      emailError.textContent = "";
      passwordError.textContent = "";
      setMessage(formError, "");
      setMessage(formSuccess, "");
    }

    function updateCharacterState() {
      const hasPassword = passwordInput.value.length > 0;
      const visiblePassword = passwordInput.type === "text";

      characters.classList.toggle("password-hidden", hasPassword && !visiblePassword);
      characters.classList.toggle("password-visible", hasPassword && visiblePassword);
    }

    function triggerTypingAnimation() {
      characters.classList.add("typing");
      window.clearTimeout(typingTimer);
      typingTimer = window.setTimeout(() => {
        characters.classList.remove("typing");
      }, 800);
    }

    function schedulePeek() {
      window.clearTimeout(peekTimer);

      if (!(passwordInput.value.length > 0 && passwordInput.type === "text")) {
        characters.classList.remove("peek");
        return;
      }

      const delay = 2000 + Math.random() * 3000;
      peekTimer = window.setTimeout(() => {
        characters.classList.add("peek");
        window.setTimeout(() => characters.classList.remove("peek"), 800);
        schedulePeek();
      }, delay);
    }

    function validateForm() {
      clearMessages();

      let valid = true;
      const emailValue = emailInput.value.trim();
      const passwordValue = passwordInput.value;
      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!emailPattern.test(emailValue)) {
        emailError.textContent = "Please enter a valid email address.";
        valid = false;
      }

      if (passwordValue.length < 6) {
        passwordError.textContent = "Password must be at least 6 characters.";
        valid = false;
      }

      return valid;
    }

    document.addEventListener("mousemove", (event) => {
      allPupils.forEach((pupil) => {
        const rect = pupil.parentElement.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const dx = event.clientX - centerX;
        const dy = event.clientY - centerY;
        const limit = pupil.classList.contains("dot") ? 5 : 4;
        const angle = Math.atan2(dy, dx);
        const distance = Math.min(Math.hypot(dx, dy) / 18, limit);
        const x = Math.cos(angle) * distance;
        const y = Math.sin(angle) * distance;
        pupil.style.setProperty("--pupil-x", x.toFixed(2) + "px");
        pupil.style.setProperty("--pupil-y", y.toFixed(2) + "px");
      });
    });

    function randomBlink() {
      const delay = 3000 + Math.random() * 4000;
      window.setTimeout(() => {
        blinkableEyes.forEach((eye) => eye.classList.add("blink"));
        window.setTimeout(() => {
          blinkableEyes.forEach((eye) => eye.classList.remove("blink"));
          randomBlink();
        }, 150);
      }, delay);
    }

    emailInput.addEventListener("focus", triggerTypingAnimation);
    emailInput.addEventListener("input", triggerTypingAnimation);

    passwordInput.addEventListener("input", () => {
      updateCharacterState();
      schedulePeek();
    });

    togglePassword.addEventListener("click", () => {
      const showing = passwordInput.type === "text";
      passwordInput.type = showing ? "password" : "text";
      togglePassword.setAttribute("aria-label", showing ? "Show password" : "Hide password");
      eyeOpen.style.display = showing ? "block" : "none";
      eyeClosed.style.display = showing ? "none" : "block";
      updateCharacterState();
      schedulePeek();
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      if (!validateForm()) {
        setMessage(formError, "Invalid email or password. Please try again.");
        return;
      }

      clearMessages();
      submitButton.disabled = true;
      submitButton.querySelector(".default-text").textContent = "Signing in...";
      submitButton.querySelector(".hover-text span").textContent = "Signing in...";

      window.setTimeout(() => {
        submitButton.disabled = false;
        submitButton.querySelector(".default-text").textContent = "Log in";
        submitButton.querySelector(".hover-text span").textContent = "Log in";
        setMessage(formSuccess, "Frontend extraction complete. This standalone file preserves the UI and interactions, but it is not connected to the app authentication backend.");
      }, 700);
    });

    googleButton.addEventListener("click", () => {
      clearMessages();
      setMessage(formSuccess, "Google sign-in is a visual placeholder in this standalone frontend extraction.");
    });

    updateCharacterState();
    randomBlink();
  </script>
</body>
</html>
