<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽奖系统 | 找回密码</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body data-page="forgot-password">
<main class="login-page">
    <section class="login-page-hero" aria-hidden="true">
        <div class="login-page-hero-top">
            <a class="login-page-brand" href="/login">
                <span class="brand-icon" aria-hidden="true">
                    <span></span>
                    <span></span>
                </span>
                <span>CareerCompass</span>
            </a>
        </div>

        <div class="login-page-hero-stage">
            <div class="login-characters" id="characterScene">
                <div class="login-character purple-character">
                    <div class="login-face">
                        <div class="login-eye"><div class="pupil"></div></div>
                        <div class="login-eye"><div class="pupil"></div></div>
                    </div>
                </div>

                <div class="login-character black-character">
                    <div class="login-face">
                        <div class="login-eye small"><div class="pupil"></div></div>
                        <div class="login-eye small"><div class="pupil"></div></div>
                    </div>
                </div>

                <div class="login-character orange-character">
                    <div class="login-face">
                        <div class="pupil dot"></div>
                        <div class="pupil dot"></div>
                    </div>
                </div>

                <div class="login-character yellow-character">
                    <div class="login-face">
                        <div class="pupil dot"></div>
                        <div class="pupil dot"></div>
                    </div>
                    <div class="login-mouth"></div>
                </div>
            </div>
        </div>

        <div class="login-page-hero-footer">
            <a href="javascript:void(0)">隐私政策</a>
            <a href="javascript:void(0)">服务条款</a>
        </div>
    </section>

    <section class="login-page-panel">
        <div class="login-panel-inner auth-secondary-panel">
            <div class="login-brand-mobile">
                <span class="brand-icon" aria-hidden="true">
                    <span></span>
                    <span></span>
                </span>
                <span>CareerCompass</span>
            </div>

            <header class="login-panel-header">
                <h1>找回管理员访问</h1>
                <p>输入管理员邮箱后，系统会发送恢复验证码到你的邮箱</p>
            </header>

            <form class="login-form" id="forgotPasswordForm" novalidate>
                <div class="login-field">
                    <label for="forgotEmail">管理员邮箱</label>
                    <div class="login-input-wrap">
                        <input id="forgotEmail" name="email" type="email" class="login-text-input" placeholder="请输入管理员邮箱" autocomplete="email" required>
                    </div>
                    <p class="field-hint">只有管理员账号可以使用该恢复流程，普通用户邮箱会被拒绝。</p>
                </div>

                <div class="status-alert" id="forgotPasswordStatus" role="alert" aria-live="polite"></div>

                <button class="login-submit-button" id="forgotPasswordSubmit" type="submit">
                    <span class="button-surface"><span class="button-label">发送恢复验证码</span></span>
                    <span class="button-hover">
                        <span class="button-label">发送恢复验证码</span>
                    </span>
                </button>
            </form>

            <p class="login-signup">想起密码了？<a href="/login">返回登录</a></p>
        </div>
    </section>
</main>
<script src="/js/auth.js" defer></script>
</body>
</html>
