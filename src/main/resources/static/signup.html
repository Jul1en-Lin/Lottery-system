<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽奖系统 | 管理员注册</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body data-page="signup">
<main class="login-page">
    <section class="login-page-hero" aria-hidden="true">
        <div class="login-page-hero-top">
            <a class="login-page-brand" href="/login">
                <span class="brand-icon" aria-hidden="true">
                    <span></span>
                    <span></span>
                </span>
                <span>CareerCompass</span>
            </a>
        </div>

        <div class="login-page-hero-stage">
            <div class="login-characters" id="characterScene">
                <div class="login-character purple-character">
                    <div class="login-face">
                        <div class="login-eye"><div class="pupil"></div></div>
                        <div class="login-eye"><div class="pupil"></div></div>
                    </div>
                </div>

                <div class="login-character black-character">
                    <div class="login-face">
                        <div class="login-eye small"><div class="pupil"></div></div>
                        <div class="login-eye small"><div class="pupil"></div></div>
                    </div>
                </div>

                <div class="login-character orange-character">
                    <div class="login-face">
                        <div class="pupil dot"></div>
                        <div class="pupil dot"></div>
                    </div>
                </div>

                <div class="login-character yellow-character">
                    <div class="login-face">
                        <div class="pupil dot"></div>
                        <div class="pupil dot"></div>
                    </div>
                    <div class="login-mouth"></div>
                </div>
            </div>
        </div>

    </section>

    <section class="login-page-panel">
        <div class="login-panel-inner auth-secondary-panel auth-signup-panel">
            <div class="login-brand-mobile">
                <span class="brand-icon" aria-hidden="true">
                    <span></span>
                    <span></span>
                </span>
                <span>CareerCompass</span>
            </div>

            <header class="login-panel-header">
                <h1>创建管理员账号</h1>
                <p>使用管理员邮箱完成注册</p>
            </header>

            <form class="login-form" id="signupForm" novalidate>
                <input id="signupIdentity" name="identity" type="hidden" value="ADMIN">

                <div class="login-field">
                    <label for="signupUserName">管理员名称</label>
                    <div class="login-input-wrap">
                        <input id="signupUserName" name="userName" type="text" class="login-text-input" placeholder="请输入管理员名称" autocomplete="name" required>
                    </div>
                </div>

                <div class="split-grid">
                    <div class="login-field">
                        <label for="signupEmail">管理员邮箱</label>
                        <div class="login-input-wrap">
                            <input id="signupEmail" name="email" type="email" class="login-text-input" placeholder="请输入管理员邮箱" autocomplete="email" required>
                        </div>
                    </div>
                    <div class="login-field">
                        <label for="signupPhoneNumber">联系电话</label>
                        <div class="login-input-wrap">
                            <input id="signupPhoneNumber" name="phoneNumber" type="tel" class="login-text-input" maxlength="11" placeholder="请输入 11 位管理员手机号" autocomplete="tel" required>
                        </div>
                    </div>
                </div>

                <div class="split-grid">
                    <div class="login-field">
                        <label for="signupPassword">管理员密码</label>
                        <div class="login-input-wrap">
                            <input id="signupPassword" name="password" type="password" class="login-text-input login-password-input" placeholder="请输入 6 到 20 位字母或数字" autocomplete="new-password">
                            <button class="login-toggle-visibility" type="button" id="toggleSignupPassword" aria-label="显示密码">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="login-field">
                        <label for="signupCode">管理员验证码</label>
                        <div class="login-input-wrap">
                            <input id="signupCode" name="code" type="text" class="login-text-input login-code-input" inputmode="numeric" maxlength="6" placeholder="请输入 6 位验证码" autocomplete="one-time-code" required>
                            <button type="button" class="login-send-code" id="signupSendCode">发送验证码</button>
                        </div>
                    </div>
                </div>

                <label class="checkbox-field consent-field">
                    <input id="signupConsent" type="checkbox" required>
                    <span>我已阅读并同意相关协议。</span>
                </label>

                <div class="status-alert" id="signupStatus" role="alert" aria-live="polite"></div>

                <button class="login-submit-button" id="signupSubmit" type="submit">
                    <span class="button-surface"><span class="button-label">创建管理员账号</span></span>
                    <span class="button-hover">
                        <span class="button-label">创建管理员账号</span>
                    </span>
                </button>
            </form>

            <p class="login-signup">已有账号？<a href="/login">立即登录</a></p>
        </div>
    </section>
</main>
<script src="/js/auth.js" defer></script>
</body>
</html>
