<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽奖系统 | 管理员登录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body data-page="login">
<main class="login-page">
    <section class="login-page-hero" aria-hidden="true">
        <div class="login-page-hero-top">
            <a class="login-page-brand" href="/login">
                <span class="brand-icon" aria-hidden="true">
                    <span></span>
                    <span></span>
                </span>
                <span>CareerCompass</span>
            </a>
        </div>

        <div class="login-page-hero-stage">
            <div class="login-characters" id="characterScene">
                <div class="login-character purple-character">
                    <div class="login-face">
                        <div class="login-eye"><div class="pupil"></div></div>
                        <div class="login-eye"><div class="pupil"></div></div>
                    </div>
                </div>

                <div class="login-character black-character">
                    <div class="login-face">
                        <div class="login-eye small"><div class="pupil"></div></div>
                        <div class="login-eye small"><div class="pupil"></div></div>
                    </div>
                </div>

                <div class="login-character orange-character">
                    <div class="login-face">
                        <div class="pupil dot"></div>
                        <div class="pupil dot"></div>
                    </div>
                </div>

                <div class="login-character yellow-character">
                    <div class="login-face">
                        <div class="pupil dot"></div>
                        <div class="pupil dot"></div>
                    </div>
                    <div class="login-mouth"></div>
                </div>
            </div>
        </div>

        <div class="login-page-hero-footer">
            <a href="javascript:void(0)">隐私政策</a>
            <a href="javascript:void(0)">服务条款</a>
        </div>
    </section>

    <section class="login-page-panel">
        <div class="login-panel-inner">
            <div class="login-brand-mobile">
                <span class="brand-icon" aria-hidden="true">
                    <span></span>
                    <span></span>
                </span>
                <span>CareerCompass</span>
            </div>

            <header class="login-panel-header">
                <h1>欢迎回来</h1>
                <p>请输入管理员账号信息</p>
            </header>

            <form class="login-form" id="loginForm" novalidate>
                <div class="login-field">
                    <label for="loginEmail">邮箱</label>
                    <div class="login-input-wrap">
                        <input id="loginEmail" name="email" type="email" class="login-text-input" placeholder="you@example.com" autocomplete="email" required>
                    </div>
                </div>

                <div class="auth-method-switch" id="loginMethodSwitch" role="tablist" aria-label="管理员登录方式" data-active-mode="password">
                    <button type="button" class="method-chip active" data-mode="password" aria-selected="true">密码登录</button>
                    <button type="button" class="method-chip" data-mode="email" aria-selected="false">邮箱验证码登录</button>
                </div>

                <div class="login-mode-stack" id="loginModeStack">
                    <div class="login-field login-mode-panel is-active" data-mode-panel="password">
                        <label for="loginPassword">密码</label>
                        <div class="login-input-wrap">
                            <input id="loginPassword" name="password" type="password" class="login-text-input login-password-input" placeholder="********" autocomplete="current-password">
                            <button class="login-toggle-visibility" type="button" id="toggleLoginPassword" aria-label="显示密码">
                                <svg id="loginEyeOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                <svg id="loginEyeClosed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                                    <path d="M3 3l18 18"></path>
                                    <path d="M10.6 10.7a3 3 0 0 0 4.2 4.2"></path>
                                    <path d="M9.9 5.2A10.6 10.6 0 0 1 12 5c6.5 0 10 7 10 7a17.7 17.7 0 0 1-3 4.1"></path>
                                    <path d="M6.6 6.7C4.2 8.4 2.7 11 2 12c0 0 3.5 7 10 7a9.8 9.8 0 0 0 4.4-1"></path>
                                </svg>
                            </button>
                        </div>
                        <p class="field-hint">如果该邮箱属于普通用户，系统会拒绝登录。</p>
                    </div>

                    <div class="login-field login-mode-panel is-inactive" data-mode-panel="email">
                        <label for="loginCode">验证码</label>
                        <div class="login-input-wrap">
                            <input id="loginCode" name="code" type="text" class="login-text-input login-code-input" inputmode="numeric" maxlength="6" placeholder="6-digit code" autocomplete="one-time-code" required>
                            <button type="button" class="login-send-code" id="loginSendCode">发送验证码</button>
                        </div>
                        <p class="field-hint">只有管理员邮箱可以接收登录验证码，验证码 5 分钟内有效。</p>
                    </div>
                </div>

                <div class="login-helper-row">
                    <label class="login-remember" for="rememberDevice">
                        <input id="rememberDevice" type="checkbox">
                        <span>30 天内记住此设备</span>
                    </label>
                    <a class="login-forgot" href="/forgot-password">忘记密码？</a>
                </div>

                <div class="status-alert" id="loginStatus" role="alert" aria-live="polite"></div>

                <button class="login-submit-button" id="loginSubmit" type="submit">
                    <span class="button-surface"><span class="button-label">密码登录</span></span>
                    <span class="button-hover">
                        <span class="button-label">密码登录</span>
                    </span>
                </button>
            </form>

            <p class="login-signup">
                还没有管理员账号？
                <a href="/signup">立即注册</a>
            </p>
        </div>
    </section>
</main>
<script src="/js/auth.js" defer></script>
</body>
</html>
