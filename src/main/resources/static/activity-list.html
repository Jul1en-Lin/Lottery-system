<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽奖系统 | 活动列表</title>
    <meta name="description" content="浏览所有正在进行中或即将开始的抽奖活动，选择你感兴趣的活动参与抽奖。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Chakra+Petch:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/site-design-system.css">
</head>
<body data-page="site-activity-list">
<main class="site-shell">
    <header class="site-navbar">
        <a class="site-brand" href="/homepage"><span class="site-brand-mark"></span><span>LuckyFlow</span></a>
        <nav class="site-nav-links">
            <a href="/homepage">首页</a>
            <a class="is-active" href="/activity-list">活动列表</a>
            <a href="/user-center">用户中心</a>
            <a href="/prize-record">中奖记录</a>
        </nav>
        <button class="site-nav-cta" id="listRefreshBtn">刷新列表</button>
    </header>

    <section class="site-main">
        <section class="site-hero">
            <p class="site-kicker">Activity Catalog</p>
            <h1>全部抽奖活动<br><span class="accent">LIVE &amp; UPCOMING</span></h1>
            <p>点击活动卡片可进入详情页参与抽奖，数据实时来自服务器。</p>
            <div class="capsule-row" id="listHeroCapsules">
                <span class="info-capsule">加载中…</span>
            </div>
        </section>

        <section class="panel-card span-12">
            <div class="section-head">
                <div>
                    <h3>活动卡片列表</h3>
                    <p id="listSubtitle">正在获取活动数据，请稍候。</p>
                </div>
                <span class="tag" id="listCountTag">—</span>
            </div>
            <!-- 活动列表区域，由 JS 动态填充 -->
            <div class="card-grid" id="activityCardGrid">
                <p class="empty-tip">正在加载活动列表…</p>
            </div>
            <!-- 分页控件 -->
            <div class="pagination-row" id="paginationRow" style="display:none;">
                <button class="outline-btn" id="prevPageBtn" disabled>上一页</button>
                <span id="pageIndicator">第 1 页</span>
                <button class="outline-btn" id="nextPageBtn">下一页</button>
            </div>
        </section>
    </section>
</main>

<script src="/js/http.js" defer></script>
<script src="/js/site-ui.js" defer></script>
<script>
(function () {
    "use strict";

    /** 分页状态 */
    const pagination = {
        current: 1,
        size: 10,
        total: 0
    };

    /**
     * 加载活动列表（方案 A：GET + query string）。
     * 若后端已改为 @RequestParam，则直接可用。
     * 若后端暂未修改，将捕获错误并展示友好提示。
     *
     * @param {number} [current=1]
     * @param {number} [size=10]
     */
    async function loadActivityList(current, size) {
        current = current || 1;
        size = size || 10;

        const grid = document.getElementById("activityCardGrid");
        const countTag = document.getElementById("listCountTag");
        const subtitle = document.getElementById("listSubtitle");
        const capsules = document.getElementById("listHeroCapsules");

        grid.innerHTML = '<p class="empty-tip">正在加载活动列表…</p>';
        if (countTag) countTag.textContent = "加载中";

        try {
            const payload = await requestJson(
                `/activity/queryList?current=${encodeURIComponent(current)}&size=${encodeURIComponent(size)}`
            );

            const pageData = payload.data || {};
            const records = Array.isArray(pageData.records) ? pageData.records : [];
            const total = Number(pageData.total || records.length);

            pagination.current = current;
            pagination.total = total;

            /* 更新 hero 胶囊 */
            const activeCount = records.filter((a) => a.valid).length;
            const endedCount = records.filter((a) => !a.valid).length;
            if (capsules) {
                capsules.innerHTML = `
                    <span class="info-capsule">进行中 ${activeCount}</span>
                    <span class="info-capsule">已结束 ${endedCount}</span>
                    <span class="info-capsule">共 ${total} 项</span>
                `;
            }
            if (subtitle) subtitle.textContent = `共找到 ${total} 个活动，当前显示第 ${current} 页。`;
            if (countTag) countTag.textContent = `${records.length} 个活动`;

            /* 渲染卡片 */
            grid.innerHTML = "";
            if (!records.length) {
                grid.innerHTML = '<p class="empty-tip">暂无活动数据，请稍后再试。</p>';
                updatePagination(total, size);
                return;
            }

            records.forEach((activity) => {
                const card = document.createElement("article");
                card.className = "activity-card";
                card.setAttribute("role", "button");
                card.setAttribute("tabindex", "0");
                card.setAttribute("aria-label", `进入活动：${activity.activityName || "未命名活动"}`);
                card.innerHTML = `
                    <h4>${escapeHtml(activity.activityName || "未命名活动")}</h4>
                    <p>${escapeHtml(activity.description || "活动说明待补充")}</p>
                    <div class="capsule-row">
                        <span class="info-capsule">${activity.valid ? "进行中" : "已结束"}</span>
                        <span class="info-capsule">${activity.valid ? "活动时间待公布" : "查看中奖记录"}</span>
                    </div>
                `;
                const goDetail = () => {
                    window.location.href = `/activity-detail?activityId=${encodeURIComponent(activity.activityId)}`;
                };
                card.addEventListener("click", goDetail);
                card.addEventListener("keydown", (e) => {
                    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); goDetail(); }
                });
                grid.appendChild(card);
            });

            updatePagination(total, size);
        } catch (error) {
            console.error("加载活动列表失败:", error);
            grid.innerHTML = `<p class="empty-tip">活动加载失败：${escapeHtml(error.message || "请稍后重试")}</p>`;
            if (countTag) countTag.textContent = "加载失败";
            if (capsules) capsules.innerHTML = '<span class="info-capsule">数据获取失败</span>';
        }
    }

    /** 更新分页控件 */
    function updatePagination(total, size) {
        const totalPages = Math.max(1, Math.ceil(total / size));
        const row = document.getElementById("paginationRow");
        const prevBtn = document.getElementById("prevPageBtn");
        const nextBtn = document.getElementById("nextPageBtn");
        const indicator = document.getElementById("pageIndicator");

        if (!row) return;
        row.style.display = totalPages > 1 ? "flex" : "none";
        if (indicator) indicator.textContent = `第 ${pagination.current} / ${totalPages} 页`;
        if (prevBtn) prevBtn.disabled = pagination.current <= 1;
        if (nextBtn) nextBtn.disabled = pagination.current >= totalPages;
    }

    document.addEventListener("DOMContentLoaded", () => {
        loadActivityList(1, 10);

        document.getElementById("prevPageBtn")?.addEventListener("click", () => {
            if (pagination.current > 1) {
                loadActivityList(pagination.current - 1, pagination.size);
            }
        });
        document.getElementById("nextPageBtn")?.addEventListener("click", () => {
            const totalPages = Math.ceil(pagination.total / pagination.size);
            if (pagination.current < totalPages) {
                loadActivityList(pagination.current + 1, pagination.size);
            }
        });
        document.getElementById("listRefreshBtn")?.addEventListener("click", () => {
            loadActivityList(pagination.current, pagination.size);
        });
    });
})();
</script>
</body>
</html>
